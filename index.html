<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hdr-bg"></div>
    <header id="hdr">
        <div class="container">
            <h1>TRAV</h1>
            <h2>Travel Made Easy</h2>
        </div>
    </header>

    <section class="destinations">
        <div class="container">
            <div class="dest">
                <h3>Paris</h3>
                <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=1173&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Paris" width="40%">
            </div>

            <div class="dest">
                <h3>New York</h3>
                <img src="https://plus.unsplash.com/premium_photo-1714051660720-888e8454a021?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="New York" width="40%">
            </div>
        </div>
        <a href="#contact" class="btn">Contact Us</a>
    </section>

    <section class="prices">
        <div class="container">
            <h2>Our Prices</h2>
            <ul>
                <li>Paris: $1000</li>
                <li>New York: $1200</li>
            </ul>
        </div>
    </section>

    <section class="contact" id="contact">
        <div class="container">
            <h2>Contact Us</h2>
            <p>Email: contact@trav.com</p>
            <p>Phone: +91 1234567890</p>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2029 TRAV. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
